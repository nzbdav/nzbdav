name: Test Discord Announcements

on:
  workflow_dispatch:
    inputs:
      message:
        description: Message to post to the announcements Discord channel
        required: true
        type: string

permissions:
  contents: read

jobs:
  test-announcements-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Post test message to Discord announcements
        env:
          DISCORD_ANNOUNCEMENTS_WEBHOOK_URL: ${{ secrets.DISCORD_ANNOUNCEMENTS_WEBHOOK_URL }}
          MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_ANNOUNCEMENTS_WEBHOOK_URL}" ]; then
            echo "DISCORD_ANNOUNCEMENTS_WEBHOOK_URL secret is not set" >&2
            exit 1
          fi
          if [ -z "${MESSAGE}" ]; then
            echo "message input is empty" >&2
            exit 1
          fi

          # Discord content limit is 2000; split on newlines instead of truncating.
          MAX_LEN=1900
          post_discord_chunk() {
            local escaped
            escaped=$(printf '%s' "$1" | jq -Rsa .)
            curl --fail-with-body -sS -H "Content-Type: application/json" \
              -d "{\"content\": ${escaped}, \"flags\": 4}" \
              "$DISCORD_ANNOUNCEMENTS_WEBHOOK_URL"
          }

          buf=""
          first_chunk=1
          while IFS= read -r line || [ -n "${line}" ]; do
            if [ -n "${buf}" ]; then
              candidate="${buf}"$'\n'"${line}"
            else
              candidate="${line}"
            fi
            if [ "${#candidate}" -le "${MAX_LEN}" ]; then
              buf="${candidate}"
              continue
            fi
            if [ -n "${buf}" ]; then
              if [ "${first_chunk}" -eq 0 ]; then sleep 1; fi
              post_discord_chunk "${buf}"
              first_chunk=0
              buf="${line}"
            else
              buf="${line}"
            fi
            while [ "${#buf}" -gt "${MAX_LEN}" ]; do
              if [ "${first_chunk}" -eq 0 ]; then sleep 1; fi
              post_discord_chunk "${buf:0:${MAX_LEN}}"
              first_chunk=0
              buf="${buf:${MAX_LEN}}"
            done
          done <<< "${MESSAGE}"

          if [ -n "${buf}" ]; then
            if [ "${first_chunk}" -eq 0 ]; then sleep 1; fi
            post_discord_chunk "${buf}"
          fi
