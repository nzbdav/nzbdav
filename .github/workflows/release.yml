name: Release

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to publish (e.g. 0.6.5)
        required: true

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
      sha: ${{ steps.release.outputs.sha }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create release
        uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json

  resolve-version:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.vars.outputs.version }}
      major: ${{ steps.vars.outputs.major }}
      minor: ${{ steps.vars.outputs.minor }}
      patch: ${{ steps.vars.outputs.patch }}
      ref: ${{ steps.vars.outputs.ref }}
    steps:
      - name: Resolve version and tag
        id: vars
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            REF="v${VERSION}"
          else
            REF="${{ github.event.release.tag_name }}"
            VERSION="${REF#v}"
          fi
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${VERSION##*.}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
          echo "patch=${PATCH}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

  deploy:
    if: github.event_name == 'push' && needs.release-please.outputs.release_created == 'true'
    needs: release-please
    uses: ./.github/workflows/docker-build-push.yml
    permissions:
      contents: read
      packages: write
    with:
      tags: |
        ghcr.io/${{ github.repository }}:latest
        ghcr.io/${{ github.repository }}:dev
        ghcr.io/${{ github.repository }}:v${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}.${{ needs.release-please.outputs.patch }}
        ghcr.io/${{ github.repository }}:v${{ needs.release-please.outputs.major }}
        ghcr.io/${{ github.repository }}:v${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
      nzbdav_version: ${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}.${{ needs.release-please.outputs.patch }}
      checkout_ref: ${{ needs.release-please.outputs.sha }}
    secrets:
      registry_token: ${{ secrets.GITHUB_TOKEN }}

  deploy-manual:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: resolve-version
    uses: ./.github/workflows/docker-build-push.yml
    permissions:
      contents: read
      packages: write
    with:
      tags: |
        ghcr.io/${{ github.repository }}:latest
        ghcr.io/${{ github.repository }}:dev
        ghcr.io/${{ github.repository }}:${{ needs.resolve-version.outputs.ref }}
        ghcr.io/${{ github.repository }}:v${{ needs.resolve-version.outputs.major }}
        ghcr.io/${{ github.repository }}:v${{ needs.resolve-version.outputs.major }}.${{ needs.resolve-version.outputs.minor }}
      nzbdav_version: ${{ needs.resolve-version.outputs.version }}
      checkout_ref: ${{ needs.resolve-version.outputs.ref }}
    secrets:
      registry_token: ${{ secrets.GITHUB_TOKEN }}

  tag-dev:
    if: github.event_name == 'push' && needs.release-please.outputs.release_created == 'true'
    needs:
      - release-please
      - deploy
    uses: ./.github/workflows/move-dev-tag.yml
    permissions:
      contents: write
    with:
      ref: ${{ needs.release-please.outputs.sha }}

  tag-dev-manual:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs:
      - resolve-version
      - deploy-manual
    uses: ./.github/workflows/move-dev-tag.yml
    permissions:
      contents: write
    with:
      ref: ${{ needs.resolve-version.outputs.ref }}

  announce:
    if: github.event_name == 'push' && needs.release-please.outputs.release_created == 'true'
    needs:
      - release-please
      - deploy
      - tag-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Post announcement to Discord
        env:
          DISCORD_ANNOUNCEMENTS_WEBHOOK_URL: ${{ secrets.DISCORD_ANNOUNCEMENTS_WEBHOOK_URL }}
          VERSION: ${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}.${{ needs.release-please.outputs.patch }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_ANNOUNCEMENTS_WEBHOOK_URL}" ]; then
            echo "DISCORD_ANNOUNCEMENTS_WEBHOOK_URL secret is not set" >&2
            exit 1
          fi

          # Single-process extract: a sed|sed pipeline SIGPIPEs under pipefail when the
          # second sed quits at the next ## [version] heading on a large CHANGELOG.
          RELEASE_NOTES=$(awk '
            /^## \[[0-9]+\.[0-9]+\.[0-9]+\]\(/ {
              if (seen++) exit
              next
            }
            seen { print }
          ' CHANGELOG.md)
          RELEASE_URL="https://github.com/${REPO}/releases/tag/v${VERSION}"
          ANNOUNCEMENT_BODY=$(printf '**New Release: v%s**\n%s\n\n%s' "${VERSION}" "${RELEASE_NOTES}" "${RELEASE_URL}")

          # Discord content limit is 2000; split on newlines instead of truncating.
          MAX_LEN=1900
          post_discord_chunk() {
            local escaped
            escaped=$(printf '%s' "$1" | jq -Rsa .)
            curl --fail-with-body -sS -H "Content-Type: application/json" \
              -d "{\"content\": ${escaped}, \"flags\": 4}" \
              "$DISCORD_ANNOUNCEMENTS_WEBHOOK_URL"
          }

          buf=""
          first_chunk=1
          while IFS= read -r line || [ -n "${line}" ]; do
            if [ -n "${buf}" ]; then
              candidate="${buf}"$'\n'"${line}"
            else
              candidate="${line}"
            fi
            if [ "${#candidate}" -le "${MAX_LEN}" ]; then
              buf="${candidate}"
              continue
            fi
            if [ -n "${buf}" ]; then
              if [ "${first_chunk}" -eq 0 ]; then sleep 1; fi
              post_discord_chunk "${buf}"
              first_chunk=0
              buf="${line}"
            else
              buf="${line}"
            fi
            while [ "${#buf}" -gt "${MAX_LEN}" ]; do
              if [ "${first_chunk}" -eq 0 ]; then sleep 1; fi
              post_discord_chunk "${buf:0:${MAX_LEN}}"
              first_chunk=0
              buf="${buf:${MAX_LEN}}"
            done
          done <<< "${ANNOUNCEMENT_BODY}"

          if [ -n "${buf}" ]; then
            if [ "${first_chunk}" -eq 0 ]; then sleep 1; fi
            post_discord_chunk "${buf}"
          fi
